# MegaBonk AI — Default Configuration
# =====================================

# --- Screen Capture ---
capture:
  # Target FPS for DXCam capture
  target_fps: 60
  # Game window title (used to find the window)
  window_title: "MegaBonk"
  # Capture region: null = full screen, or [left, top, right, bottom]
  region: null
  # Output color format for DXCam
  output_color: "BGR"

# --- Preprocessing ---
preprocessing:
  # Resize resolution for the agent's observation
  resize_width: 84
  resize_height: 84
  # Convert to grayscale
  grayscale: true
  # Number of frames to stack
  frame_stack: 4
  # Extra semantic planes appended to observation so the model receives
  # explicit UI/HUD/menu/prompt state, not only downscaled pixels.
  semantic_ui_channels: 3

# --- Action Space ---
actions:
  # Mouse sensitivity multiplier (pixels per delta unit per step)
  mouse_speed: 15
  # Mouse smoothing: interpolate mouse movements over N sub-steps
  mouse_smoothing_steps: 1
  # Duration (seconds) to hold keys between steps
  key_hold_duration: 0.05
  # Action mapping
  horizontal_options: 3    # [nothing, A, D]
  vertical_options: 3      # [nothing, W, S]
  jump_options: 2          # [nothing, Space]
  mouse_dx_options: 9      # [-4..+4]
  mouse_dy_options: 7      # [-3..+3]
  # Interaction / pickup / confirm action. The RL agent can choose this
  # to pick up map items or confirm prompts when the game expects E.
  interact_options: 2      # [nothing, interact]
  interact_key: "e"

# --- Rewards ---
rewards:
  # Per-step survival reward
  survival_reward: 0.01
  # Reward for gaining XP / leveling up
  xp_reward: 5.0
  # Penalty multiplier for HP loss (reward = -hp_loss_penalty * pct_lost)
  hp_loss_penalty: 1.0
  # Penalty for dying (game over)
  death_penalty: -10.0
  # Reward multiplier for score increase
  score_reward_multiplier: 0.1
  # Small shaping reward for visual novelty/exploration. Megabonk is a 3D
  # survivor-like where moving through the map finds XP, shrines, items and
  # totems; this discourages standing still without overpowering core rewards.
  exploration_reward: 0.002
  visual_novelty_threshold: 6.0
  # Anti-stuck penalty when frames stay visually similar for too long.
  stagnation_penalty: 0.01
  stagnation_steps: 90

  # HUD regions for OCR [left, top, right, bottom] in screen pixels
  # These MUST be calibrated for your resolution!
  # Run `python run_reward_calibration.py` to set these.
  hp_region: [50, 50, 300, 80]
  xp_region: [50, 85, 300, 105]
  score_region: [850, 20, 1070, 55]

  # Template images for game state detection (relative to project root)
  game_over_template: "Configs/templates/game_over.png"
  level_up_template: "Configs/templates/level_up.png"

  # Template matching threshold (0.0 - 1.0)
  template_match_threshold: 0.8

# --- UI Recognition ---
ui:
  # Exposes recognized HUD/menu/prompt state to the model and automation helpers.
  enabled: true
  template_match_threshold: 0.8
  score_normalizer: 10000.0
  # Optional templates, relative to project root. Add calibrated screenshots for
  # your build/language/resolution; missing files are skipped with a warning.
  templates:
    # Run start / lobby flow
    main_menu: "Configs/templates/main_menu.png"
    character_select: "Configs/templates/character_select.png"
    stage_select: "Configs/templates/stage_select.png"
    difficulty_select: "Configs/templates/difficulty_select.png"
    loading_screen: "Configs/templates/loading_screen.png"
    # Upgrade/choice flow during a run
    perk_choice: "Configs/templates/level_up.png"
    upgrade_choice: "Configs/templates/upgrade_choice.png"
    weapon_choice: "Configs/templates/weapon_choice.png"
    tome_choice: "Configs/templates/tome_choice.png"
    item_choice: "Configs/templates/item_choice.png"
    chest_reward: "Configs/templates/chest_reward.png"
    # Map interactables/prompts
    interact_prompt: "Configs/templates/interact_prompt.png"
    pickup_prompt: "Configs/templates/pickup_prompt.png"
    shrine_prompt: "Configs/templates/shrine_prompt.png"
    chest_prompt: "Configs/templates/chest_prompt.png"
    portal_prompt: "Configs/templates/portal_prompt.png"
    challenge_prompt: "Configs/templates/challenge_prompt.png"
    # Meta/progression/options screens
    shop: "Configs/templates/shop.png"
    quests: "Configs/templates/quests.png"
    unlocks: "Configs/templates/unlocks.png"
    settings: "Configs/templates/settings.png"
    credits: "Configs/templates/credits.png"
    pause_menu: "Configs/templates/pause_menu.png"
    confirmation_dialog: "Configs/templates/confirmation_dialog.png"
    # End-of-run flow
    game_over: "Configs/templates/game_over.png"
    death_screen: "Configs/templates/death_screen.png"
    results_screen: "Configs/templates/results_screen.png"
    run_summary: "Configs/templates/run_summary.png"
  # Optional search regions [left, top, right, bottom] to reduce false matches.
  regions: {}

# --- Environment ---
environment:
  # Max steps per episode (0 = unlimited, episode ends on death)
  max_steps: 0
  # Delay (seconds) between steps to control game speed
  step_delay: 0.033  # ~30 actions per second
  # Delay after reset (seconds) to wait for game to load
  reset_delay: 3.0
  # Whether to pause the game on reset (if supported)
  pause_on_reset: false
  # Automatically press a confirm key when a level-up/perk choice is detected.
  # This keeps training from stalling on selection screens while the agent
  # still has an explicit interact action for map items/pickups.
  auto_confirm_level_up: true
  auto_confirm_key: "enter"
  auto_confirm_cooldown_steps: 30
  auto_confirm_repeats: 2
  # Periodically press interact so button totems and nearby pickups can be used
  # even before the policy has fully learned the interact action.
  auto_interact_enabled: true
  auto_interact_key: "e"
  auto_interact_every_steps: 45
  auto_interact_hold_duration: 0.05
  # Automatically clear blocking UI states so training can enter runs, recover
  # after death and continue if pause/menu screens appear. These keys should
  # match your in-game menu bindings.
  auto_navigate_ui: true
  auto_menu_confirm_key: "enter"
  auto_death_restart_key: "enter"
  auto_pause_back_key: "escape"
  # Optional per-screen navigation sequences. Use these when MegaBonk needs
  # different keys after game over, e.g. main menu -> character -> stage.
  # Each list advances one key per auto_ui_cooldown_steps while that screen is visible.
  auto_death_restart_keys: ["enter"]
  auto_main_menu_keys: ["enter"]
  auto_character_select_keys: ["enter"]
  auto_stage_select_keys: ["enter"]
  auto_difficulty_select_keys: ["enter"]
  auto_confirmation_dialog_keys: ["enter"]
  auto_pause_back_keys: ["escape"]
  auto_blocking_menu_keys: ["enter"]
  auto_loading_screen_keys: []
  auto_ui_cooldown_steps: 20
  # When a blocking menu, pause menu, death/results screen or upgrade choice is
  # visible, stop sending policy movement/mouse actions and let UI automation
  # press one deliberate key at a time. This prevents stuck WASD/mouse inputs
  # while the game expects menu navigation.
  pause_agent_on_blocking_ui: true
  # Release held gameplay keys before menu/choice inputs.
  ui_release_before_input: true
  # Short real-time pause after menu/choice input so the game UI can animate,
  # load, or accept focus before the next decision.
  ui_action_pause_seconds: 0.15

# --- PPO Hyperparameters ---
ppo:
  # Policy type
  policy: "CnnPolicy"
  # Learning rate
  learning_rate: 0.0003
  # Number of steps per rollout
  n_steps: 2048
  # Mini-batch size
  batch_size: 64
  # Number of training epochs per rollout
  n_epochs: 10
  # Discount factor
  gamma: 0.99
  # GAE lambda
  gae_lambda: 0.95
  # Clip range
  clip_range: 0.2
  # Entropy coefficient (higher = more exploration)
  ent_coef: 0.01
  # Value function coefficient
  vf_coef: 0.5
  # Max gradient norm
  max_grad_norm: 0.5
  # Verbose level (0=silent, 1=info, 2=debug)
  verbose: 1
  # Device
  device: "cuda"

# --- Training ---
training:
  # Total timesteps to train
  total_timesteps: 500_000
  # Checkpoint frequency (save every N steps)
  checkpoint_freq: 10_000
  # Checkpoint directory
  checkpoint_dir: "Checkpoints"
  # Log directory (TensorBoard)
  log_dir: "Logs"
  # Model save path
  model_save_path: "Models/megabonk_ppo"

# --- Inference ---
inference:
  # Path to trained model
  model_path: "Models/megabonk_ppo.zip"
  # Show overlay with action info
  show_overlay: true
  # Overlay position [x, y]
  overlay_position: [10, 10]
